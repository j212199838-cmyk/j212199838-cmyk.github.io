<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人作业主页</title>
    <style>
        /* 标签选择器：全局基础样式 */
        body {
            margin: 0;
            padding: 20px;
            font-size: 16px;
            line-height: 1.8;
            background-color: #f5f5f5;
        }

        /* ID选择器：左上角学号 */
        #student-id {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }

        /* 类选择器：容器样式 */
        .container {
            margin-top: 60px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            color: #0066cc;
        }

        ul {
            list-style-image: url('https://img.icons8.com/fluency/10/000000/code.png');
            padding-left: 30px;
        }

        li {
            margin: 10px 0;
        }

        a {
            color: #0066cc;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- 左上角学号显示 -->
    <div id="student-id">学号：25051030335</div>

    <div class="container">
        <h1>我的编程作业主页</h1>
        <p>欢迎来到我的作业汇总页面，点击下方链接查看对应作业：</p>

        <ul>
            <!-- 已完成作业：Claude Code 介绍页 -->
            <li>
                <a href="./homework/Claude code.html">Claude Code 介绍网页作业</a>
            </li>

            <!-- ========== 其他作业预留位置 ========== -->
            <!-- 后续你有新作业，直接在这里添加 <li><a href="作业文件名.html">作业名称</a></li> 即可 -->
            <!-- 示例：
            <li><a href="./homework2.html">作业2：xxx页面</a></li>
            <li><a href="./homework3.html">作业3：xxx页面</a></li>
            ====================================== -->
        </ul>
    </div>
</body>
</html>
