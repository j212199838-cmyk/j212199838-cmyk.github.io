<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 介绍</title>
    <style>
        /* 标签选择器 */
        body {
            line-height: 1.8;
            font-size: 16px;
            color: #333;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }

        p {
            text-indent: 2em;
            font-weight: normal;
        }

        ul {
            /* 列表图片标号（10px左右小图标） */
            list-style-image: url('https://img.icons8.com/fluency/10/000000/code.png');
            padding-left: 20px;
        }

        /* 类选择器 */
        .subtitle {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 20px;
        }

        .highlight {
            background-color: #fff3cd;
            padding: 2px 4px;
        }

        /* ID选择器 */
        #main-title {
            font-size: 30px;
            text-align: center;
            font-weight: bold;
            color: #0066cc;
            border-bottom: 2px solid #0066cc;
            padding-bottom: 10px;
        }

</head>
<body>
    <!-- 主标题 -->
    <h1 id="main-title">Claude Code —— 智能AI编程助手</h1>

    <!-- 小标题1 -->
    <h2 class="subtitle">什么是 Claude Code?</h2>
    <!-- 段落1 -->
    <p>Claude Code 是由 Anthropic 公司推出的<span class="highlight">AI编程助手</span>，可以帮助初学者快速写代码、查错误、学逻辑，非常适合新手学习。</p>

    <!-- 小标题2 -->
    <h2 class="subtitle">Claude Code 核心优势</h2>
    <!-- 无序列表 -->
    <ul>
        <li>支持HTML、CSS、JavaScript、Python等多种语言</li>
        <li>智能代码提示与自动修复</li>
        <li>代码逻辑详细讲解</li>
        <li>免费使用基础功能</li>
        <li>界面简洁、容易上手</li>
    </ul>

    <!-- 段落2 -->
    <p>如果你正在学习编程，<span class="highlight">Claude Code</span> 会是你学习路上非常好的帮手，随时解答你的编程问题。</p>
